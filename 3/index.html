<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <article>
        <h1>To-Do List</h1>
        <section>
          <input
            type="text"
            id="inputAdd"
            placeholder="Tambah tugas lu.."
            autocomplete="off"
            autofocus
          />

        </section>
        <ul>
          <!-- <li id="checked">Task 1</li> -->
        </ul>
      </article>
    </main>
    <script src="script.js"></script>
  </body>
</html>
